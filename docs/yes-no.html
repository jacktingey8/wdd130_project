<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="yes-no-page">
<header class="site-header">
    <nav class="main-nav">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="yes-no.html" class="active">Yes/No</a></li>
            <li><a href="why.html">Why?</a></li>

<main class="main-content text-center">
    <section class="interaction-section">
        <h2>Ask a Yes or No Question</h2>
        <form action="#answer" method="GET" class="question-form">
            <input type="text" placeholder="Type your question here..." class="question-input" required>
            <button type="submit" class="btn btn-ask">Ask the 8 Ball</button>
        </form>
    </section>

    <section id="answer" class="answer-section">
        <div class="eight-ball-display">
            <p class="magic-answer">Definitely</p>
        </div>
    </section>
</main>
